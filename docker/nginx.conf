upstream postgrest {
    server postgrest:3000;
}

upstream crm-api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    # CRM Backend API routes - rewrite to remove /api prefix
    location ~ ^/api/(.*)$ {
        proxy_pass http://crm-api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pass through auth headers
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        
        # Increase timeouts
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Supabase client sends requests to /rest/v1/
    location /rest/v1/ {
        proxy_pass http://postgrest/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Pass through auth headers
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        
        # Increase timeouts for large queries
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Auth endpoints (stub - returns success for basic operations)
    location /auth/v1/ {
        default_type application/json;
        return 200 '{"message": "Auth handled by application"}';
    }

    # Health check
    location /health {
        default_type application/json;
        return 200 '{"status": "ok"}';
    }

    # Root
    location / {
        proxy_pass http://postgrest/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
