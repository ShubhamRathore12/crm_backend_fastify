version: '3.9'

services:
  # ============================================================
  # Redis — BullMQ queue backend
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: crm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-crm_redis_secret}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-crm_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm-network
    deploy:
      resources:
        limits:
          memory: 2.5G

  # ============================================================
  # CRM API — Fastify HTTP server
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-crm_redis_secret}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./logs:/app/logs
      - dkim_keys:/etc/dkim:ro
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================
  # Email Worker — BullMQ worker (concurrency: 50)
  # ============================================================
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: crm-email-worker
    restart: unless-stopped
    command: ["node", "src/workers/emailWorker.js"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-crm_redis_secret}
      EMAIL_QUEUE_CONCURRENCY: ${EMAIL_QUEUE_CONCURRENCY:-50}
    volumes:
      - dkim_keys:/etc/dkim:ro
    networks:
      - crm-network
    deploy:
      replicas: 2  # Run 2 email worker instances for higher throughput
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================
  # Campaign Worker — BullMQ campaign dispatch worker
  # ============================================================
  campaign-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: crm-campaign-worker
    restart: unless-stopped
    command: ["node", "src/workers/campaignWorker.js"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-crm_redis_secret}
      CAMPAIGN_BATCH_SIZE: ${CAMPAIGN_BATCH_SIZE:-500}
    networks:
      - crm-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ============================================================
  # Redis Insight — Redis GUI (development only)
  # ============================================================
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: crm-redis-insight
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - redis_insight_data:/db
    networks:
      - crm-network
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

# ============================================================
# Named volumes
# ============================================================
volumes:
  redis_data:
    driver: local
  redis_insight_data:
    driver: local
  dkim_keys:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  crm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
